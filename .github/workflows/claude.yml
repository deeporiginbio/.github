name: Claude Code (Reusable)

on:
  workflow_call:
    inputs:
      prompt:
        description: Custom prompt for Claude
        required: false
        type: string
        default: ""
    secrets:
      anthropic_api_key:
        required: true

jobs:
  claude:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.anthropic_api_key }}
          prompt: ${{ inputs.prompt }}
